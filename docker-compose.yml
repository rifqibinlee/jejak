version: '3.9'

services:
  # --- GEOSERVER: Spatial Tile & WMS/WFS Server ---
  geoserver:
    image: kartoza/geoserver:2.24.2
    container_name: vibe_geoserver
    restart: always
    ports:
      - "8080:8080"
    environment:
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
      GEOSERVER_ADMIN_PASSWORD: geoserver
      GEOSERVER_ADMIN_USER: admin
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: "*"
      DB_BACKEND: POSTGRES
      HOST: vibe_db
      POSTGRES_PORT: 5432
      POSTGRES_DB: vibe_db
      POSTGRES_USER: postgres
      POSTGRES_PASS: 1234
    volumes:
      - vibe_geoserver_data:/opt/geoserver/data_dir
    depends_on:
      vibe_db:
        condition: service_healthy
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/geoserver/web/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # --- EXISTING: Relational Database for VIBE IAM, Chat, Annotations ---
  # Custom image: pgvector + PostGIS (GeoServer JDBC layers share this DB)
  vibe_db:
    build: ./db
    image: jejak-vibe-db:pg16-postgis-pgvector
    container_name: vibe_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: vibe_db
    ports:
      - "5432:5432"
    volumes:
      - vibe_pgdata:/var/lib/postgresql/data
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- NEW: ISOLATED METABASE DATABASE ---
  metabase_db:
    image: postgres:16-alpine
    container_name: metabase_db
    restart: always
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase_secret
      POSTGRES_DB: metabase_db
    volumes:
      - metabase_pgdata:/var/lib/postgresql/data
    networks:
      - vibe_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- METABASE ANALYTICS ENGINE ---
  metabase:
    # CHANGED: Pinned to stable version to bypass the v0.59.6.4 Athena bug
    image: metabase/metabase:v0.59.6.3
    container_name: metabase
    restart: always
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase_secret
      MB_DB_HOST: metabase_db
    depends_on:
      metabase_db:
        condition: service_healthy
    networks:
      - vibe_network

  # --- EXISTING: Main Web Application ---
  vibe:
    build: .
    container_name: vibe
    command: gunicorn --preload --workers 1 --threads 8 --timeout 300 --access-logfile - --error-logfile - --bind 0.0.0.0:5000 app:app
    ports:
      - "5000:5000"
    depends_on:
      vibe_db:
        condition: service_healthy
      geoserver:
        condition: service_healthy
      metabase:
        condition: service_started
    environment:
      AWS_DEFAULT_REGION: "ap-southeast-1"
      DB_HOST: vibe_db
      DB_PORT: 5432
      DB_NAME: vibe_db
      DB_USER: postgres
      DB_PASSWORD: 1234
      GEOSERVER_URL: "http://vibe_geoserver:8080/geoserver"
      GEOSERVER_USER: admin
      GEOSERVER_PASSWORD: geoserver
      GEOSERVER_WORKSPACE: vibe
      GEOSERVER_ENABLED: "true"
      GEOSERVER_BOOTSTRAP: "true"
      GEOSERVER_WMS_LAYERS: "vibe:geoserver_demo_footprints|Published regions (demo)|0.45"
      METABASE_URL: "http://52.221.228.202:3000"
      METABASE_SECRET_KEY: "0e1c46582460375c024ab228cb2994daec4daa0e21ca21711adc279444e68947"
      SECRET_KEY: "vibe-production-secret-key-2026"
      HF_HOME: "/app/hf_cache"  # <-- ADDED THIS LINE
    volumes:
      - .:/app
      - vibe_hf_cache:/app/hf_cache  # <-- ADDED THIS LINE
    networks:
      - vibe_network
    deploy:
      resources:
        limits:
          memory: 7.5G
          cpus: '2.0'

networks:
  vibe_network:
    driver: bridge

volumes:
  vibe_pgdata:
  vibe_geoserver_data:
  metabase_pgdata:
  ollama_data:
  vibe_hf_cache:
